name: "Enmacs Controller"
version: "1.1.0"  # Wichtig: Version hochzählen
slug: "enmacs_controller"
description: "Liest Sensoren direkt via API"
url: "https://github.com/DEIN_USER/ha-enmacs-addon"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
options:
  # Standard-Werte (zum Testen)
  sensors_to_watch:
    - sensor.sun
    - sensor.time
schema:
  # Das [str] erzeugt eine dynamische Liste im UI
  sensors_to_watch: [str]